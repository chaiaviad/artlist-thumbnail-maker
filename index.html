<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Artlist Tools</title>
<style>
  :root{
    --bg:#0c0c0e; --bg2:#141417; --card:#17171b; --line:#2a2a32;
    --txt:#f4f4f6; --muted:#9a9aa6; --accent:#f8da1f;
  }
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%;background:
     radial-gradient(900px 500px at 80% -10%, rgba(248,218,31,.10), transparent 60%),
     radial-gradient(700px 500px at 0% 110%, rgba(248,218,31,.06), transparent 55%),
     var(--bg);
     color:var(--txt);font-family:"Segoe UI",Arial,Helvetica,sans-serif}
  .wrap{max-width:980px;margin:0 auto;padding:64px 24px 80px;display:flex;flex-direction:column;gap:44px}
  header{display:flex;flex-direction:column;gap:14px}
  .brand{font-size:30px;font-weight:800;color:var(--accent);letter-spacing:.5px;display:flex;align-items:center;gap:2px}
  .brand b{color:var(--txt);font-weight:600;font-size:18px;margin-inline-start:8px;letter-spacing:0}
  .lead{color:var(--muted);font-size:15px;max-width:62ch;line-height:1.6}
  .eyebrow{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}

  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:22px}
  .card{position:relative;display:flex;flex-direction:column;gap:14px;background:var(--card);
     border:1px solid var(--line);border-radius:18px;padding:24px;text-decoration:none;color:inherit;
     transition:transform .15s ease,border-color .15s ease,box-shadow .15s ease}
  .card:hover{transform:translateY(-3px);border-color:var(--accent);box-shadow:0 18px 50px rgba(0,0,0,.5)}
  .card:focus-visible{outline:2px solid var(--accent);outline-offset:3px}
  .thumb{height:120px;border-radius:12px;border:1px solid var(--line);background:
     repeating-linear-gradient(135deg,#16161a 0 14px,#131316 14px 28px);
     display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
  .thumb .albig{font-size:54px;font-weight:800;color:rgba(248,218,31,.16);letter-spacing:1px}
  .titlerow{display:flex;align-items:center;gap:10px}
  .albadge{font-size:11px;font-weight:800;color:#111;background:var(--accent);border-radius:6px;padding:3px 8px;letter-spacing:.5px}
  .ttl{font-size:19px;font-weight:700}
  .desc{font-size:13.5px;color:var(--muted);line-height:1.6;flex:1}
  .tags{display:flex;flex-wrap:wrap;gap:7px}
  .tag{font-size:11px;font-weight:600;color:var(--muted);background:var(--bg2);border:1px solid var(--line);border-radius:999px;padding:4px 10px}
  .go{display:inline-flex;align-items:center;gap:8px;font-weight:700;font-size:14px;color:#111;background:var(--accent);
     border-radius:10px;padding:9px 16px;align-self:flex-start}
  footer{color:var(--muted);font-size:12px;border-top:1px solid var(--line);padding-top:20px}
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="brand">▲rtlist<b>Tools</b></div>
      <div class="eyebrow">Internal creative toolkit</div>
      <p class="lead">אוסף הכלים הפנימי של Artlist להפקת ויזואלים. בחרו כלי כדי להתחיל — הכל רץ בדפדפן, בלי התקנות.</p>
    </header>
    <main class="grid" id="grid"></main>
    <footer>Artlist Tools · רץ מקומית ובדפדפן · מסודר לפי מספור AL</footer>
  </div>

<script>
/* ============================================================
   TOOLS REGISTRY — single source of truth for the hub.
   להוספת כלי חדש: הוסיפו אובייקט אחד עם מספר ה-AL הבא.
   הסדר נקבע אוטומטית לפי שדה `al`.
   - al:     מזהה/סדר הכלי (AL-04, AL-05, ...)
   - folder: שם תיקייה נקי ב-repo (בלי & או רווחים) = ה-URL
   - title:  שם תצוגה (יכול לכלול & ורווחים)
   ============================================================ */
const TOOLS = [
  { al:"AL-04", folder:"Thumbnail_Banner_Maker", title:"Thumbnail & Banner Maker",
    desc:"יצירת thumbnails ובאנרים — טקסט, תמונות, רקעים ופריסות לפי הסטנדרט של Artlist.",
    tags:["Thumbnails","Banners"] },
  { al:"AL-05", folder:"Collab_Maker", title:"Collab Maker",
    desc:"מיקום וייצוא לוגו Artlist + לוגו שותף בשלושה פורמטים, לפי מרווחי הגייד הרשמי. ייצוא PNG שקוף.",
    tags:["16:9","1:1","9:16","PNG שקוף"] },
];

const grid=document.getElementById("grid");
const esc=s=>s.replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
TOOLS.slice().sort((a,b)=>a.al.localeCompare(b.al)).forEach(t=>{
  const a=document.createElement("a");
  a.className="card"; a.href=t.folder+"/";
  a.innerHTML=`
    <div class="thumb"><span class="albig">${esc(t.al)}</span></div>
    <div class="titlerow"><span class="albadge">${esc(t.al)}</span><span class="ttl">${esc(t.title)}</span></div>
    <p class="desc">${esc(t.desc)}</p>
    <div class="tags">${t.tags.map(x=>`<span class="tag">${esc(x)}</span>`).join("")}</div>
    <span class="go">פתיחת הכלי ←</span>`;
  grid.appendChild(a);
});
</script>
</body>
</html>
